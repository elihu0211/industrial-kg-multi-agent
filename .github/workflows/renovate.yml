name: Renovate

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一 UTC 02:00
  workflow_dispatch:       # 允許手動觸發

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46.1.19
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
