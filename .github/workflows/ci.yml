name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build apps/agent/IndustrialKgAgent.slnx --configuration Release
      - run: dotnet test apps/agent/IndustrialKgAgent.slnx --configuration Release --no-build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ikg/web exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm --filter @ikg/web test
      - run: pnpm --filter @ikg/web exec next build --webpack
