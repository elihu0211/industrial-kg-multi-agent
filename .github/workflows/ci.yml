name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build apps/agent/IndustrialKgAgent.slnx --configuration Release

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ikg/web exec tsc --noEmit
      - run: pnpm lint
      - run: pnpm --filter @ikg/web exec next build --webpack
